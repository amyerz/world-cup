<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>World Cup 2026</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- Home: Calendar / Watch / Browse / Teams -->
    <div id="home" class="screen">
      <header class="header">
        <div class="brand">
          <span class="brand-yr">2026</span>
          <span class="brand-nm">FIFA World Cup</span>
        </div>
        <span class="header-meta" id="status-indicator"></span>
      </header>
      <div class="tab-bar" id="tab-bar">
        <button class="tab-item focusable active" data-action="tab" data-tab="calendar">Calendar</button>
        <button class="tab-item focusable" data-action="tab" data-tab="browse">Groups</button>
        <button class="tab-item focusable" data-action="tab" data-tab="bracket">Bracket</button>
        <button class="tab-item focusable" data-action="tab" data-tab="teams">Teams</button>
      </div>
      <div class="content">
        <div id="home-list" class="list-container"></div>
      </div>
    </div>

    <!-- Detail: a list of matches for a group / round -->
    <div id="list-detail" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1 id="list-detail-title">Matches</h1>
      </header>
      <div class="content">
        <div id="detail-list" class="list-container"></div>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
