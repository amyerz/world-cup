<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>World Cup 2026</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- Home: tabbed schedule browser -->
    <div id="home" class="screen">
      <header class="header">
        <h1>World Cup 2026</h1>
        <span class="header-meta" id="status-indicator">Loading…</span>
      </header>
      <div class="tab-bar" id="tab-bar">
        <button class="tab-item focusable active" data-action="tab" data-tab="today">Today</button>
        <button class="tab-item focusable" data-action="tab" data-tab="groups">Groups</button>
        <button class="tab-item focusable" data-action="tab" data-tab="knockout">Knockout</button>
      </div>
      <div class="content">
        <div id="home-list" class="list-container"></div>
      </div>
    </div>

    <!-- Detail: a list of matches for a group / round -->
    <div id="list-detail" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1 id="list-detail-title">Matches</h1>
      </header>
      <div class="content">
        <div id="detail-list" class="list-container"></div>
      </div>
    </div>

    <!-- Detail: a single match -->
    <div id="match-detail" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1 id="match-detail-title">Match</h1>
      </header>
      <div class="content" id="match-detail-body"></div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
